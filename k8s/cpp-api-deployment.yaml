apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpp-api
  labels:
    app: cpp-api
spec:
  replicas: 2                        # 2 pods — load balanced
  selector:
    matchLabels:
      app: cpp-api
  template:
    metadata:
      labels:
        app: cpp-api
    spec:
      containers:
        - name: cpp-api
          image: jersey-cpp-api:latest  # built locally with docker build
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cpp-api-service
spec:
  selector:
    app: cpp-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP              # internal only — frontend accesses via ingress
