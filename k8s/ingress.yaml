apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jersey-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - host: jersey.localhost        # change to your domain in production
      http:
        paths:
          # Frontend — all routes
          - path: /()(.*)
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

          # C++ API — /api/* routes strip /api prefix
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: cpp-api-service
                port:
                  number: 80
