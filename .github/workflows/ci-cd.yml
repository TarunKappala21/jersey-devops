name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Build & Test C++ API ──────────────────────
  build-cpp:
    name: Build C++ API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ make

      - name: Build server
        run: cd jersey-store && make server

      - name: Smoke test
        run: |
          cd jersey-store
          ./jersey-server &
          sleep 2
          curl -sf http://localhost:8080/health | grep '"status":"ok"'
          kill %1
        continue-on-error: false

  # ── Build & Test React Frontend ───────────────
    build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: jersey-frontend-v2-ml/package-lock.json

      - name: Install deps
        run: cd jersey-frontend-v2-ml && npm ci

      - name: Build
        run: cd jersey-frontend-v2-ml && npm run build
        env:
          VITE_API_URL: http://localhost:8080


  # ── Docker Build & Push ───────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-cpp, build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build C++ API image
        run: docker build -t jersey-cpp-api:${{ github.sha }} ./jersey-store

      - name: Build Frontend image
        run: docker build -t jersey-frontend:${{ github.sha }} ./jersey-frontend

      # Uncomment to push to Docker Hub:
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      #
      # - name: Push images
      #   run: |
      #     docker push jersey-cpp-api:${{ github.sha }}
      #     docker push jersey-frontend:${{ github.sha }}

  # ── Deploy to K8s ─────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Uncomment when you have a real cluster:
      # - name: Set up kubectl
      #   uses: azure/setup-kubectl@v3
      #
      # - name: Deploy to cluster
      #   run: |
      #     kubectl apply -f k8s/
      #     kubectl set image deployment/cpp-api cpp-api=jersey-cpp-api:${{ github.sha }}
      #     kubectl set image deployment/frontend frontend=jersey-frontend:${{ github.sha }}
      #     kubectl rollout status deployment/cpp-api
      #     kubectl rollout status deployment/frontend

      - name: Deployment summary
        run: |
          echo "✅ Build ${{ github.sha }} ready for deployment"
          echo "Images: jersey-cpp-api:${{ github.sha }}"
          echo "        jersey-frontend:${{ github.sha }}"
